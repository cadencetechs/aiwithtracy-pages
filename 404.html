<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI with Tracy</title>
    <script>
      (function () {
        var pathSegmentsToKeep = window.location.hostname.endsWith(".github.io") ? 1 : 0;
        var location = window.location;
        var redirectPath =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          location.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          location.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
          location.hash;

        location.replace(redirectPath);
      })();
    </script>
  </head>
  <body></body>
</html>
